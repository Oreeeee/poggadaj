version: "3"

services:
  http:
    build: poggadaj-http
    restart: always
    ports:
      - "80:8080"
    environment:
      - LISTEN_ADDRESS=0.0.0.0
      - LISTEN_PORT=8080
      - DB_ADDRESS=db
      - DB_PASSWORD=${DB_PASSWORD}
      - GG_SERVICE_IP=${GG_SERVICE_IP}
      - GG_SERVICE_PORT=${GG_SERVICE_PORT}
    depends_on:
      migrate:
        condition: service_completed_successfully

  nginx:
    build: poggadaj-nginx
    restart: always
    ports:
      - "8080:8080"

  frontend:
    build: poggadaj-frontend
    restart: always
    depends_on:
      migrate:
        condition: service_completed_successfully

  api:
    build: poggadaj-api
    restart: always
    environment:
      - LISTEN_ADDRESS=0.0.0.0
      - LISTEN_PORT=8080
      - DB_ADDRESS=db
      - DB_PASSWORD=${DB_PASSWORD}
      - CACHE_ADDRESS=cache
      - GG_SEED=${GG_SEED}
    depends_on:
      migrate:
        condition: service_completed_successfully

  tcp:
    build: poggadaj-tcp
    restart: always
    ports:
      - "8074:8074"
    environment:
      - LISTEN_ADDRESS=0.0.0.0
      - DB_ADDRESS=db
      - DB_PASSWORD=${DB_PASSWORD}
      - CACHE_ADDRESS=cache
      - GG_SEED=${GG_SEED}
    depends_on:
      migrate:
        condition: service_completed_successfully

  db:
    image: postgres:17-alpine
    restart: always
    volumes:
      - ./db:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    environment:
      - POSTGRES_USER=poggadaj
      - POSTGRES_PASSWORD=${DB_PASSWORD}
    healthcheck:
      test: ["CMD", "pg_isready"]
      interval: 5s
      timeout: 5s
      retries: 15

  cache:
    image: valkey/valkey:9.0-alpine
    restart: always
    ports:
      - "127.0.0.1:6379:6379"

  migrate:
    image: migrate/migrate
    restart: no
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./migrations:/migrations
    command:
      [
        "-path",
        "/migrations",
        "-database",
        "postgres://poggadaj:${DB_PASSWORD}@db:5432/poggadaj?sslmode=disable",
        "up",
      ]
